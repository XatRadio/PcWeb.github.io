<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MILANO ONDE RADIO - ACHILLE</title>
    <style>
        :root {
           
            --cover-top: 170px;     
            --cover-left: 160px;    
            --cover-size: 80px;    
            --clock-top: 220px;
            --clock-left: 200px; 
            --name-top: 100px;
            --name-left: 171px;
            --name-font-size: 15px; 
            --marquee-top: 365px;
            --marquee-left: 230px;
            --marquee-width: 320px;
            --vol-bottom: 10px;
            --vol-right: 390px;
            --date-top: 250px;
            --date-right: 430px;
            --controls-bottom: 30px;
            --controls-left: 40px;
        }

        body { background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }

        .ACHILLE {
            background-color: #111;
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            position: relative;
            width: 600px;
            height: 400px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            font-family: Arial, sans-serif;
        }

        .clock-container {
            position: absolute;
            top: var(--clock-top);
            left: var(--clock-left);
            width: 0; height: 0;
            z-index: 10;
        }
        .clock-container ul {
            list-style: none; margin: 0; padding: 0;
            position: absolute;
            transition: transform 0.5s cubic-bezier(0.4, 2.08, 0.55, 0.44);
            top: 0; left: 0;
        }
        .clock-container li {
            position: absolute;
            color: #A7DD3C;
            font-size: 10px;
            font-weight: bold;
            opacity: 0.2;
            transition: all 0.3s;
            transform-origin: 0 0;
        }
        .clock-container li.active {
            opacity: 1;
            text-shadow: 0 0 8px #A7DD3C;
            font-size: 12px;
        }

        .cover-container { position: absolute; top: var(--cover-top); left: var(--cover-left); width: var(--cover-size); height: var(--cover-size); z-index: 5; }
        .album-cover { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #A7DD3C; background-size: cover; box-shadow: 0 0 15px rgba(0,0,0,0.8); background-image: url('https://i.postimg.cc/zBn36NB6/LNUlVsS.png'); }
        .rotating { animation: rotate 12s linear infinite; }
        @keyframes rotate { from {transform: rotate(0deg)} to {transform: rotate(360deg)} }
        
        .station-name { 
            position: absolute; 
            top: var(--name-top); 
            left: var(--name-left); 
            color: #A7DD3C; 
            font-size: var(--name-font-size); 
            font-weight: bold; 
            text-shadow: 2px 2px 4px black; 
            z-index: 5; 
        }

        .marquee-box { position: absolute; top: var(--marquee-top); left: var(--marquee-left); width: var(--marquee-width); background: rgba(0,0,0,0.5); padding: 5px; border-radius: 4px; overflow: hidden; white-space: nowrap; z-index: 5; }
        .marquee-text { display: inline-block; padding-left: 100%; animation: scroll 15s linear infinite; color: white; font-size: 16px; }
        @keyframes scroll { 0% {transform: translateX(0)} 100% {transform: translateX(-100%)} }
        .volume-box { position: absolute; bottom: var(--vol-bottom); right: var(--vol-right); z-index: 10; display: flex; align-items: center; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 15px; }
        input[type=range] { cursor: pointer; width: 80px; accent-color: #A7DD3C; }
        #current-date { position: absolute; top: var(--date-top); right: var(--date-right); color: #A7DD3C; font-size: 10px; z-index: 10; font-weight: bold; }
        .bottom-controls { position: absolute; bottom: var(--controls-bottom); left: var(--controls-left); display: flex; align-items: center; gap: 15px; z-index: 10; }
        .play-btn { width: 45px; height: 45px; cursor: pointer; }
        .online-count { color: white; font-size: 13px; background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 10px; border: 1px solid #A7DD3C; }
    </style>
</head>
<body>

<div class="ACHILLE">
    <div class="cover-container">
        <div class="album-cover rotating" id="cover-art"></div>
    </div>

    <div class="station-name">𝓐𝓒𝓗𝓘𝓛𝓛𝓔</div>
    
    <div class="marquee-box">
        <div class="marquee-text" id="track-info">MILANO ONDE RADIO - Caricamento...</div>
    </div>

    <div class="clock-container">
        <ul id="h"></ul>
        <ul id="m"></ul>
        <ul id="s"></ul>
    </div>

    <div id="current-date">DATA</div>

    <div class="volume-box">
        <span style="color:white; margin-right:8px; font-size:12px;">VOL</span>
        <input type="range" id="volControl" min="0" max="1" step="0.1" value="0.7">
    </div>

    <div class="bottom-controls">
        <img src="https://i.imgur.com/EZeXK2j.png" class="play-btn" id="playTrigger">
        <div class="online-count">ONLINE: <span id="listeners">0</span></div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    const _STREAM = "https://a4.asurahosting.com:6980/radio.mp3";
    const _API = "https://a4.asurahosting.com/api/nowplaying/342";
    const audio = new Audio(_STREAM);
    audio.volume = 0.7;
    const _0x4f2b = ["aHR0cHM6Ly94YXRpbWcuY29tL2ltYWdlL29zclJBNTV6Q0VwcC5naWY="];
    function draw() {
        for(let i=0; i<60; i++) {
            let D = (i<10) ? '0'+i : i;
            $('#s').append(`<li data-item="${D}">${D}</li>`);
            $('#m').append(`<li data-item="${D}">${D}</li>`);
        }
        for(let i=0; i<24; i++) {
            let D = (i<10) ? '0'+i : i;
            $('#h').append(`<li data-item="${D}">${D}</li>`);
        }
    }

    function place() {
       
        $('#s li').each(function(i) { $(this).css('transform', `rotateZ(${6*i}deg) translateX(110px)`); });
        $('#m li').each(function(i) { $(this).css('transform', `rotateZ(${6*i}deg) translateX(85px)`); });
        $('#h li').each(function(i) { $(this).css('transform', `rotateZ(${15*i}deg) translateX(60px)`); });
    }

    function updateClock() {
        const d = new Date();
        const H = d.getHours(), M = d.getMinutes(), S = d.getSeconds();
        $('#s li').removeClass('active').eq(S).addClass('active');
        $('#s').css('transform', `rotateZ(-${6*S}deg)`);
        $('#m li').removeClass('active').eq(M).addClass('active');
        $('#m').css('transform', `rotateZ(-${6*M}deg)`);
        $('#h li').removeClass('active').eq(H).addClass('active');
        $('#h').css('transform', `rotateZ(-${15*H}deg)`);
        document.getElementById('current-date').innerText = d.toLocaleDateString('it-IT', { weekday: 'short', day: 'numeric', month: 'short' }).toUpperCase();
    }

    $('#playTrigger').click(function() {
        if (audio.paused) {
            audio.play();
            $(this).attr('src', "https://i.imgur.com/JaMFJJo.png");
        } else {
            audio.pause();
            $(this).attr('src', "https://i.imgur.com/EZeXK2j.png");
        }
    });

    $('#volControl').on('input', function() { audio.volume = $(this).val(); });

    async function getStats() {
        try {
            const r = await fetch(_API);
            const d = await r.json();
            $('#track-info').text(d.now_playing.song.text + " - MILANO ONDE RADIO");
            const art = d.now_playing.song.art || 'https://xatimg.com/image/Raa2Vap5p0Go.png';
            $('#cover-art').css('background-image', `url('${art}')`);
            $('#listeners').text(d.listeners.total);
        } catch (e) { console.error("Errore API"); }
    }

    $(document).ready(function() {
       
        $('.ACHILLE').css('background-image', 'url(' + atob(_0x4f2b[0]) + ')');
        
        draw();
        place();
        setInterval(updateClock, 1000);
        updateClock();
        setInterval(getStats, 10000);
        getStats();
    });
</script>
</body>
</html>
