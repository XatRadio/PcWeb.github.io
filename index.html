<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Milano Onde Radio</title>
    <style>
        /* Questo serve a far sì che il video occupi tutta la pagina senza bordi bianchi */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Riempie lo schermo adattandosi */
            pointer-events: none; /* Nasconde il tasto destro sul video */
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline>
        <source src="M.R.O.gif" type="video/gif">
    </video>

</body>
</html>
