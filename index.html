<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milano Onde Radio</title>
    <style>
        /* Reset generale */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            overflow-x: hidden;
            background-color: #000;
        }

        /* SFONDO VIDEO (LORY) */
        .video-sfondo-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .video-sfondo-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* CONTENITORE PRINCIPALE SOPRA IL VIDEO */
        .main-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.55); /* Velo scuro uniforme per dare leggibilità */
            padding: 40px 20px;
            text-align: center;
        }

        /* BOX CENTRALE DI MILANO ONDE RADIO */
        .box-radio {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            max-width: 550px;
            width: 100%;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.4rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
        }

        .firma {
            font-size: 1.1rem;
            letter-spacing: 5px;
            color: #ffdd57;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 10px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
        }

        .stato-radio {
            margin-top: 25px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            font-style: italic;
            font-size: 0.95rem;
        }

        /* SEZIONE NAVIGAZIONE PER NON PERDERE GLI ALTRI FILE (Mor, Ispiria, ecc) */
        .nav-altri-contenuti {
            max-width: 550px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 480px) {
            .nav-altri-contenuti {
                grid-template-columns: 1fr;
            }
        }

        .btn-link {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 14px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-link:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            transform: translateY(-2px);
        }

        .btn-full {
            grid-column: span 2;
        }
        @media (max-width: 480px) {
            .btn-full {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="video-sfondo-container">
        <video autoplay muted loop playsinline>
            <source src="lory.mp4" type="video/mp4">
            Il tuo browser non supporta i video HTML5.
        </video>
    </div>

    <div class="main-wrapper">
        
        <div class="box-radio">
            <h1>Milano Onde Radio</h1>
            <p class="firma">ACHILLE</p>
            
            <div class="stato-radio">
                In onda ora...
            </div>
        </div>

        <div class="nav-altri-contenuti">
            <a href="mor.html" class="btn-link">Vai a MOR Pagina</a>
            
            <a href="ispiria.mp4" class="btn-link" target="_blank">Guarda Ispiria Video</a>
            
            <a href="radiocosmicdance.html" class="btn-link btn-full">Radio Cosmic Dance</a>
        </div>

    </div>

</body>
</html>
