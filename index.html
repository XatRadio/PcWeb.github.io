<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milano Onde Radio</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        .video-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 30px;
        }
        .video-box {
            background: #111;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
        }
        .firma {
            color: #ffdd57;
            font-weight: bold;
            letter-spacing: 3px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Milano Onde Radio</h1>
    <p class="firma">ACHILLE</p>

    <div class="video-container">
        <div class="video-box">
            <h3>Ispiria</h3>
            <video src="ispiria.mp4" controls width="300" height="200"></video>
        </div>

        <div class="video-box">
            <h3>Mor</h3>
            <video src="mor.mp4" controls width="300" height="200"></video>
        </div>

        <div class="video-box">
            <h3>Lory</h3>
            <video src="lory.mp4" controls width="300" height="200"></video>
        </div>
    </div>

</body>
</html>
