<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milano Onde Radio</title>
    <style>
        body {
            /* Imposta la nuova GIF come sfondo */
            background-image: url('sfondoradiospiria.gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Stile per rendere visibili ed eleganti i testi sopra lo sfondo */
        h1 {
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            margin-bottom: 10px;
        }

        p {
            font-size: 1.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            margin-bottom: 30px;
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.5); /* Sfondo scuro semitrasparente per leggere meglio */
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Milano Onde Radio</h1>
        <p>ACHILLE</p>

        <audio controls autoplay>
            <source src="http://95.154.192.123:8012/;stream.mp3" type="audio/mpeg">
            Il tuo browser non supporta l'elemento audio.
        </audio>
    </div>

</body>
</html>
