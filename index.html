<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Milano Onde Radio</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100% !important;
            height: 100% !important;
            overflow: hidden !important;
            background-color: #000;
        }
        video {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            min-width: 100% !important;
            min-height: 100% !important;
            object-fit: cover !important;
            object-position: center center !important;
            /* Il trucco magico: ingrandisce impercettibilmente il video (2%) */
            /* Così quando si fa zoom, Xat non riesce a scoprire i bordi neri sotto */
            transform: scale(1.02); 
            z-index: -100 !important;
        }
    </style>
</head>
<body>
    <video src="https://xatradio.github.io/PcWeb.github.io/lory.mp4" autoplay loop muted playsinline></video>
</body>
</html>
