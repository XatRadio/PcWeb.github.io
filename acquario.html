<!DOCTYPE html>
<html>
<head>
<style>
  body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: black; }
  #video-sfondo {
    position: fixed;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    z-index: -1;
    transform: translateX(-50%) translateY(-50%);
    object-fit: cover;
  }
</style>
</head>
<body>
  <video autoplay muted loop playsinline id="video-sfondo">
    <source src="acquario.mp4" type="video/mp4">
  </video>
</body>
</html>
