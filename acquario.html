<!DOCTYPE html>
<html>
<head>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
  .sfondo-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
</style>
</head>
<body>
  <video id="vid" class="sfondo-video" autoplay muted loop playsinline poster="https://xatradio.github.io/PcWeb.github.io/acquario.mp4">
    <source src="acquario.mp4" type="video/mp4">
  </video>
  <script>
    var video = document.getElementById('vid');
    video.play();
    document.addEventListener('click', function() { video.play(); });
  </script>
</body>
</html>
