<!DOCTYPE html>
<html>
<head>
<style>
  html, body { 
    margin: 0 !important; 
    padding: 0 !important; 
    width: 100% !important; 
    height: 100% !important; 
    overflow: hidden !important; 
    background-color: #000 !important; 
  }
  .sfondo-video { 
    position: fixed !important; 
    top: 0 !important; 
    left: 0 !important; 
    width: 100vw !important; 
    height: 100vh !important; 
    object-fit: cover !important; 
    z-index: 9999 !important; 
  }
</style>
</head>
<body>
  <video id="vid" class="sfondo-video" autoplay muted loop playsinline poster="acquario.mp4">
    <source src="acquario.mp4" type="video/mp4">
  </video>
  <script>
    var video = document.getElementById('vid');
    // Forzatura per avvio automatico
    video.play().catch(function() {
      document.addEventListener('click', function() { video.play(); }, {once: true});
    });
  </script>
</body>
</html>
