<!DOCTYPE html>
<html lang="it">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        video {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: center bottom; /* <--- FORZA L'INQUADRATURA SULLA PARTE BASSA (LA TORRE) */
        }
    </style>
</head>
<body>

    </video>
</body>
</head>
</html>
